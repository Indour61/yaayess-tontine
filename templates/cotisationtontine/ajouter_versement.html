{% extends 'base.html' %}

{% block title %}Ajouter un versement{% endblock %}

{% block content %}

<div class="container py-4">

  <div class="row justify-content-center">

    <div class="col-lg-6 col-md-8 col-sm-12">

      <div class="card shadow-lg border-0">

        <div class="card-body p-4">

          <!-- Titre -->
          <h3 class="fw-bold text-success text-center mb-3">
            ➕ Ajouter un versement
          </h3>

          <p class="text-center text-muted mb-4">
            Groupe : <strong>{{ group.nom }}</strong>
          </p>

          <form method="post" class="needs-validation" novalidate>

            {% csrf_token %}

            <!-- Montant -->
            <div class="mb-3">

              <label for="montant" class="form-label fw-semibold">
                💰 Montant
              </label>

              <div class="input-group">

                <input
                  type="number"
                  step="0.01"
                  min="0.01"
                  class="form-control form-control-lg"
                  id="montant"
                  name="montant"
                  placeholder="Ex : 5000"
                  required
                >

                <span class="input-group-text">
                  FCFA
                </span>

              </div>

              <div class="invalid-feedback">
                Veuillez saisir un montant valide supérieur à 0.
              </div>

            </div>


            <!-- Méthode paiement -->
            <div class="mb-3">

              <label for="methode" class="form-label fw-semibold">
                💳 Méthode de paiement
              </label>

              <select
                class="form-select form-select-lg"
                id="methode"
                name="methode"
                required
              >

                <option value="">
                  -- Choisir une méthode --
                </option>

                <option value="ESPECES">
                  💵 Espèces
                </option>

                <option value="PAYDUNYA">
                  📱 PayDunya
                </option>

                <option value="PAYPAL">
                  🌐 PayPal
                </option>

              </select>

              <div class="invalid-feedback">
                Veuillez sélectionner une méthode de paiement.
              </div>

            </div>


            <!-- Boutons -->
            <div class="d-flex flex-wrap gap-2 mt-4">

              <button type="submit" class="btn btn-success flex-grow-1">

                💾 Enregistrer le versement

              </button>

              <a href="{% url 'cotisationtontine:group_detail' group.id %}"
                 class="btn btn-outline-secondary flex-grow-1">

                 Annuler

              </a>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>


<script>

(() => {

  'use strict'

  const forms = document.querySelectorAll('.needs-validation')

  Array.from(forms).forEach(form => {

    form.addEventListener('submit', event => {

      if (!form.checkValidity()) {

        event.preventDefault()
        event.stopPropagation()

      }

      form.classList.add('was-validated')

    })

  })

})()

</script>

{% endblock %}

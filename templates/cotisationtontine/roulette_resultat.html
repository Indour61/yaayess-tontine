{% extends "base.html" %}

{% block content %}
<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card shadow border-0 text-center">

                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">🎰 Tirage au sort</h4>
                </div>

                <div class="card-body">

                    <h5 class="text-muted mb-4">
                        Étape {{ etape.numero }}
                    </h5>

                    <div id="roulette" class="roulette-animation mb-4">
                        🎉 {{ gagnant.nom }}
                    </div>

                    <p class="text-success fw-bold fs-5">
                        Félicitations au gagnant !
                    </p>

                    <div class="d-grid gap-2 mt-4">
                        <a href="{% url 'cotisationtontine:dashboard_tontine_simple' %}"
                           class="btn btn-primary">
                            ⬅ Retour au tableau de bord
                        </a>
                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<style>

.roulette-animation{
    font-size: 2.2rem;
    font-weight: bold;
    padding: 20px;
    border-radius: 10px;
    background: #f8f9fa;
    display: inline-block;
    animation: spinReveal 3s ease-out;
}

@keyframes spinReveal {

    0%{
        transform: rotateX(0deg) scale(0.5);
        opacity: 0;
    }

    50%{
        transform: rotateX(360deg) scale(1.2);
        opacity: 0.7;
    }

    100%{
        transform: rotateX(720deg) scale(1);
        opacity: 1;
    }

}

@media (max-width:768px){

    .roulette-animation{
        font-size: 1.6rem;
        padding:15px;
    }

}

</style>

{% endblock %}

{% extends 'base.html' %}

{% block title %}Rembourser un crédit{% endblock %}

{% block content %}
<div class="container py-4">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card shadow border-0">

                <div class="card-header bg-warning text-dark text-center">
                    <h4 class="mb-0">💸 Remboursement de crédit</h4>
                </div>

                <div class="card-body">

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            {{ form.as_p }}
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-between">

                            <button type="submit" class="btn btn-warning w-100 w-md-auto">
                                💳 Confirmer le remboursement
                            </button>

                            <a href="{{ cancel_url }}" class="btn btn-outline-secondary w-100 w-md-auto">
                                ❌ Annuler
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>
{% endblock %}

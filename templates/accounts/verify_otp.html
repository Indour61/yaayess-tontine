<div style="max-width:400px;margin:auto;margin-top:100px;text-align:center">

    <h2>🔐 Vérification OTP</h2>

    {% if messages %}
        {% for message in messages %}
            <p style="color:red;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <!-- ✅ CORRECTION ICI -->
        <input type="text" name="otp" placeholder="Entrer le code"
               style="padding:10px;width:100%;margin-bottom:10px" required>

        <button type="submit" style="padding:10px;width:100%">
            ✅ Valider
        </button>
    </form>

    <br>

    <!-- ✅ CORRECTION : lien au lieu de fetch -->
    <a href="{% url 'accounts:resend_otp' %}">
        <button style="padding:8px;width:100%">
            🔁 Renvoyer le code
        </button>
    </a>

</div>
